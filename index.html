<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curiosity</title>
    <script>
        // Check authentication and redirect to appropriate page
        window.addEventListener('DOMContentLoaded', () => {
            const currentUser = localStorage.getItem('currentUser');

            if (currentUser) {
                try {
                    const user = JSON.parse(currentUser);

                    // If user has no role yet, redirect to onboarding
                    if (!user.role) {
                        window.location.href = 'pages/onboarding-role.html';
                        return;
                    }

                    if (!user.name) {
                        window.location.href = 'pages/onboarding-name.html';
                        return;
                    }

                    // Redirect to appropriate dashboard based on role
                    if (user.role === 'teacher') {
                        window.location.href = 'pages/dashboard.html?role=teacher';
                    } else {
                        window.location.href = 'pages/dashboard.html?role=student';
                    }
                } catch (error) {
                    console.error('Error parsing user data:', error);
                    // If there's an error parsing, redirect to login
                    window.location.href = 'pages/login.html';
                }
            } else {
                // No user logged in, redirect to login page
                window.location.href = 'pages/login.html';
            }
        });
    </script>
</head>

<body>
    <p>Cargando... Por favor espere.</p>
</body>

</html>
