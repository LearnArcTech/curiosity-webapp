<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What is your name? - Curiosity</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="../styles/onboarding.css">
</head>

<body>
    <header class="header">
        <div class="logo">Curiosity</div>
        <nav class="nav-links">
            <a href="#">Help</a>
        </nav>
        <div class="user-icon">
            <img src="../Images/logo.png" alt="Curiosity logo">
        </div>
    </header>

    <main class="main-content">
        <section class="form-section">
            <h1>¿Cuál es tu nombre?</h1>
            <p class="subtitle"><a href="#" id="skip-name">Saltar</a></p>
            <form id="name-form">
                <div class="form-group">
                    <input type="text" id="name" name="name" placeholder="Nombre">
                </div>
                <button type="submit" class="submit-btn">Continuar</button>
            </form>
        </section>
    </main>

    <footer class="footer">
        <div>© 2026 Curiosity</div>
        <div class="footer-links">
            <a href="#">Accessibility Settings</a>
            <a href="#">Help Center</a>
            <a href="#">Privacy Policy</a>
            <a href="#">Terms of Service</a>
        </div>
    </footer>

    <script type="module">
        import { AuthService } from '../js/authService.js';
        import { DataService } from '../js/dataService.js';
        import { ROUTES } from '../js/config.js';

        if (!AuthService.isAuthenticated()) {
            window.location.href = ROUTES.LOGIN;
        }

        const goToDashboard = () => {
            const user = AuthService.getCurrentUser();
            if (!user) {
                window.location.href = ROUTES.LOGIN;
                return;
            }

            window.location.href = user.role === 'teacher'
                ? ROUTES.DASHBOARD_TEACHER
                : ROUTES.DASHBOARD_STUDENT;
        };

        document.getElementById('name-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value.trim();
            if (name) {
                const user = AuthService.getCurrentUser();
                if (!user) {
                    window.location.href = ROUTES.LOGIN;
                    return;
                }

                user.name = name;
                localStorage.setItem('currentUser', JSON.stringify(user));
                await DataService.updateUser(user.email, { name });
                goToDashboard();
            }
        });

        document.getElementById('skip-name').addEventListener('click', (e) => {
            e.preventDefault();
            goToDashboard();
        });
    </script>
</body>

</html>
