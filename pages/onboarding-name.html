<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What is your name? - Curiosity</title>
    <script defer src="../js/layout.js"></script>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="../styles/onboarding.css">
</head>

<body>
    <header class="header">
        <a class="brand" href="login.html" aria-label="Inicio de Curiosity">
            <img class="brand-logo" src="../Images/logo.png" alt="Logo de Curiosity">
            <span class="brand-name">Curiosity</span>
        </a>
        <nav class="nav-links">
            <a href="#">Cursos</a>
            <a href="#">Ayuda</a>
        </nav>
        <div class="account-menu">
            <button type="button" class="account-button" data-account-button aria-haspopup="true" aria-expanded="false" aria-label="Abrir menú de cuenta">
                <span class="account-icon" aria-hidden="true"></span>
            </button>
            <div class="account-dropdown" data-account-dropdown role="menu" hidden>
                <p class="account-name" data-account-name>Visitante</p>
                <button type="button" class="logout-btn" data-account-action role="menuitem">Iniciar sesión</button>
            </div>
        </div>
    </header>

    <main class="main-content">
        <section class="form-section">
            <h1>¿Cuál es tu nombre?</h1>
            <p class="subtitle"><a href="#" id="skip-name">Saltar</a></p>
            <form id="name-form">
                <div class="form-group">
                    <input type="text" id="name" name="name" placeholder="Nombre">
                </div>
                <button type="submit" class="submit-btn">Continuar</button>
            </form>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-brand">
            <strong>Curiosity</strong>
            <span>&copy; 2026 LearnArc</span>
        </div>
        <div class="footer-links">
            <a href="#">Ajustes de accesibilidad</a>
            <a href="#">Centro de ayuda</a>
            <a href="#">Privacidad</a>
            <a href="#">Términos</a>
        </div>
    </footer>

    <script type="module">
        import { AuthService } from '../js/authService.js';
        import { DataService } from '../js/dataService.js';
        import { ApiClient } from '../js/apiClient.js';
        import { ROUTES } from '../js/config.js';

        if (!AuthService.isAuthenticated()) {
            window.location.href = ROUTES.LOGIN;
        }

        const goToDashboard = () => {
            const user = AuthService.getCurrentUser();
            if (!user) {
                window.location.href = ROUTES.LOGIN;
                return;
            }

            window.location.href = user.role === 'teacher'
                ? ROUTES.DASHBOARD_TEACHER
                : ROUTES.DASHBOARD_STUDENT;
        };

        document.getElementById('name-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value.trim();
            if (name) {
                const user = AuthService.getCurrentUser();
                if (!user) {
                    window.location.href = ROUTES.LOGIN;
                    return;
                }

                user.name = name;
                try {
                    const response = await ApiClient.patch('/api/users/me', { name });
                    if (response?.user) Object.assign(user, response.user);
                } catch (error) {
                    console.warn('Nombre no pudo sincronizarse con backend:', error.message);
                }
                localStorage.setItem('currentUser', JSON.stringify(user));
                await DataService.updateUser(user.email, { name });
                goToDashboard();
            }
        });

        document.getElementById('skip-name').addEventListener('click', (e) => {
            e.preventDefault();
            goToDashboard();
        });
    </script>
</body>

</html>
