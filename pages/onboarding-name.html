<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curiosity</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="../styles/onboarding.css">
</head>

<body>
    <header class="header">
        <div class="nav-wrapper">
            <div class="logo">Curiosity</div>
            <nav class="nav-links">
                <a href="/">Courses</a>
                <a href="#">Help</a>
            </nav>
        </div>
        <div class="user-icon">Icon</div>
    </header>

    <main class="main-content">
        <section class="form-section">
            <h1>What is your name?</h1>
            <p class="subtitle"><a href="onboarding-role.html">Skip</a></p>
            <form id="name-form">
                <div class="form-group">
                    <input type="text" id="name" name="name" placeholder="Name">
                </div>
                <button type="submit" class="submit-btn">Continue</button>
            </form>
        </section>
    </main>

    <footer class="footer">
        <div>© 2026 Curiosity</div>
        <div class="footer-links">
            <a href="#">Accessibility Settings</a>
            <a href="#">Help Center</a>
            <a href="#">Privacy Policy</a>
            <a href="#">Terms of Service</a>
        </div>
    </footer>

    <script type="module" src="../js/services.js"></script>
    <script type="module" src="../js/config.js"></script>
    <script type="module">
        // Check if user has a role, if not redirect to role selection
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('currentUser')) || {};
            if (!user.role) {
                window.location.href = 'onboarding-role.html';
                return;
            }
            // If name is already set, skip this step
            if (user.name) {
                if (user.role === 'teacher') {
                    window.location.href = 'onboarding-course.html';
                } else {
                    window.location.href = 'dashboard-student.html';
                }
            }
        });

        document.getElementById('name-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value.trim();
            if (name) {
                const user = JSON.parse(localStorage.getItem('currentUser')) || {};
                user.name = name;
                localStorage.setItem('currentUser', JSON.stringify(user));

                // Update name in database
                try {
                    if (user.id) {
                        await DataService.updateUser(user.id, { name: name });
                    }
                } catch (error) {
                    console.error('Error updating name:', error);
                }

                // Redirect based on role
                if (user.role === 'teacher') {
                    window.location.href = 'onboarding-course.html';
                } else {
                    window.location.href = 'dashboard-student.html';
                }
            }
        });
    </script>
</body>

</html>
