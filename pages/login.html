<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curiosity</title>
    <script type="module" src="../js/services.js"></script>
    <script type="module" src="../js/login.js"></script>
    <link rel="stylesheet" href="../styles.css">
</head>

<body>
    <header class="header">
        <div class="nav-wrapper">
            <div class="logo">Curiosity</div>
            <nav class="nav-links">
                <a href="help.html" class="help-link">Help</a>
            </nav>
        </div>
        <div class="user-icon"><img src="../assets/icons/account_cicle.svg" height="30" width="30" alt="User Icon">
        </div>
    </header>

    <main class="main-content">
        <section class="image-section">
            <img src="../assets/images/pexels-roman-odintsov-11025029 1.png"
                alt="Two students using a laptop in a classroom setting" width="600" height="400">
        </section>
        <section class="form-section">
            <h1>Login</h1>
            <p class="subtitle">Don't have an account? <a href="./login-register.html">Register</a><br><a
                    href="login-code.html">Login with course code</a></p>
            <form>
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="E-mail">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Password">
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Remember me</label>
                </div>
                <div class="button-group">
                    <button type="submit" class="submit-btn">Login</button>
                    <button type="button" class="guest-btn">Login as guest</button>
                </div>
            </form>
        </section>
    </main>

    <footer class="footer">
        <div>© 2026 Curiosity</div>
        <div class="footer-links">
            <a href="#">Configuración de Accesibilidad</a>
            <a href="#">Centro de Ayuda</a>
            <a href="#">Política de Privacidad</a>
            <a href="#">Términos de Servicio</a>
        </div>
    </footer>
</body>

</html>
