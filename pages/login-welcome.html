<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curiosity</title>
    <script type="module" src="../js/services.js"></script>
    <link rel="stylesheet" href="../styles.css">
</head>

<body>
    <header class="header">
        <div class="nav-wrapper">
            <div class="logo">Curiosity</div>
            <nav class="nav-links">
                <a href="/">Courses</a>
                <a href="#">Help</a>
            </nav>
        </div>
        <div class="user-icon">Icon</div>
    </header>

    <main class="main-content">
        <section class="image-section">
            <img src="https://via.placeholder.com/150"
                alt="A young student writing at a desk with a laptop and notebook">
        </section>
        <section class="form-section">
            <h1>Welcome to Science and Technology</h1>
            <form>
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="E-mail">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Password">
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm Password">
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Remember me</label>
                </div>
                <button type="submit" class="submit-btn">Login</button>
            </form>
        </section>
    </main>

    <footer class="footer">
        <div>© 2026 Curiosity</div>
        <div class="footer-links">
            <a href="#">Accessibility Settings</a>
            <a href="#">Help Center</a>
            <a href="#">Privacy Policy</a>
            <a href="#">Terms of Service</a>
        </div>
    </footer>
</body>

</html>
