<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard estudiante - Curiosity</title>
    <script defer src="../js/layout.js"></script>
    <script type="module" src="../js/services.js"></script>
    <script type="module" src="../js/dashboard-student.js"></script>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="../styles/dashboard.css">
</head>

<body class="student-dashboard-page">
    <header class="header app-header">
        <a class="brand" href="login.html" aria-label="Inicio de Curiosity">
            <img class="brand-logo" src="../Images/logo.png" alt="Logo de Curiosity">
            <span class="brand-name">Curiosity</span>
        </a>
        <nav class="nav-links" aria-label="Navegación principal">
            <a href="#dashboard">Dashboard</a>
            <a href="course.html">Cursos</a>
            <a href="help.html">Ayuda</a>
        </nav>
        <div class="account-menu">
            <button type="button" class="account-button" data-account-button aria-haspopup="true" aria-expanded="false" aria-label="Abrir menú de cuenta">
                <span class="account-icon" aria-hidden="true"></span>
            </button>
            <div class="account-dropdown" data-account-dropdown role="menu" hidden>
                <p class="account-name" data-account-name>Visitante</p>
                <button type="button" class="logout-btn" data-account-action role="menuitem">Iniciar sesión</button>
            </div>
        </div>
    </header>

    <div class="dashboard-shell student-dashboard" id="dashboard">
        <aside class="course-sidebar" aria-label="Cursos del estudiante">
            <div class="sidebar-heading">
                <h1>Cursos</h1>
                <span class="sidebar-subtitle">Estudiante</span>
            </div>
            <nav class="course-nav" id="course-list" aria-label="Cursos activos"></nav>
            <button type="button" class="sidebar-action" id="enroll-course-btn">Unirme con código</button>
            <button type="button" class="sidebar-action ghost" id="guest-login-btn" hidden>Iniciar sesión</button>
            <div class="sidebar-status" id="student-connection-status" aria-live="polite"></div>
        </aside>

        <main class="dashboard-canvas">
            <section class="summary-section" aria-labelledby="student-summary-title">
                <div class="section-title-row">
                    <div>
                        <p class="dashboard-eyebrow">Panel del estudiante</p>
                        <h2 id="student-summary-title">Resumen</h2>
                    </div>

                </div>
                <div class="summary-strip" id="summary-cards" aria-label="Resumen academico"></div>
            </section>

            <section class="general-section" aria-labelledby="student-general-title">
                <div class="section-title-row">
                    <h2 id="student-general-title">General</h2>
                    <span class="status-chip" id="student-live-status">Conexión estable</span>
                </div>

                <div class="figma-grid student-grid">
                    <article class="dashboard-panel podium-panel" aria-labelledby="student-podium-title">
                        <h3 id="student-podium-title">Podio de participación</h3>
                        <div id="student-podium"></div>
                    </article>

                    <article class="dashboard-panel roster-panel" aria-labelledby="classmates-title">
                        <div class="panel-heading">
                            <h3 id="classmates-title">Nombre de compañeros</h3>
                            <span class="status-chip" id="course-count">0 cursos</span>
                        </div>
                        <div class="student-roster" id="classmate-list"></div>
                    </article>
                </div>
            </section>

        </main>
    </div>

    <footer class="footer">
        <div class="footer-brand">
            <strong>Curiosity</strong>
            <span>&copy; 2026 LearnArc</span>
        </div>
        <div class="footer-links">
            <a href="help.html?view=accessibility">Ajustes de accesibilidad</a>
            <a href="help.html">Centro de ayuda</a>
            <a href="#">Privacidad</a>
            <a href="#">Términos</a>
        </div>
    </footer>
</body>

</html>
