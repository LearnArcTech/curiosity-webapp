<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - Curiosity</title>
    <script type="module" src="../js/services.js"></script>
    <script type="module" src="../js/dashboard-student.js"></script>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="../styles/dashboard.css">
</head>

<body>
    <header class="header">
        <div class="logo">Curiosity</div>
        <nav class="nav-links">
            <a href="#">Courses</a>
            <a href="#">Help</a>
        </nav>
        <div class="user-icon">
            <img src="../Images/logo.png" alt="Curiosity logo">
        </div>
    </header>

    <div class="dashboard">
        <aside class="sidebar">
            <h2>Courses</h2>
            <ul class="course-list" id="course-list">
                <!-- Courses will be populated by JavaScript -->
            </ul>
        </aside>

        <main class="main-dashboard">
            <h1>Summary</h1>
            <div class="summary-cards" id="summary-cards">
                <!-- Summary cards will be populated by JavaScript -->
            </div>

            <h2>Overview</h2>
            <div class="panels">
                <div class="panel">
                    <h3>Participation Leaderboard</h3>
                    <div class="podium" id="podium">
                        <!-- Leaderboard will be populated by JavaScript -->
                    </div>
                </div>

                <div class="panel">
                    <h3>Classmates</h3>
                    <ul class="student-list" id="classmates-list">
                        <!-- Classmates will be populated by JavaScript -->
                    </ul>
                </div>
            </div>
        </main>
    </div>

    <footer class="footer">
        <div>© 2026 Curiosity</div>
        <div class="footer-links">
            <a href="#">Accessibility Settings</a>
            <a href="#">Help Center</a>
            <a href="#">Privacy Policy</a>
            <a href="#">Terms of Service</a>
        </div>
    </footer>
</body>

</html>
