<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Curiosity</title>
    <script type="module" src="../js/services.js"></script>
    <script type="module" src="../js/login-register.js"></script>
    <link rel="stylesheet" href="../styles.css">
</head>

<body>
    <header class="header">
        <div class="logo">Curiosity</div>
        <nav class="nav-links">
            <a href="#">Courses</a>
            <a href="#">Help</a>
        </nav>
        <div class="user-icon">
            <img src="../Images/logo.png" alt="Curiosity logo">
        </div>
    </header>

    <main class="main-content">
        <section class="image-section">
            <img src="../Images/img_login.png" alt="Students using Curiosity">
        </section>
        <section class="form-section">
            <h1>Register</h1>
            <p class="subtitle">Already have an account? <a href="login.html">Login</a></p>
            <form>
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="E-mail">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Password">
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm Password">
                </div>
                <button type="submit" class="submit-btn">Register for free</button>
            </form>
        </section>
    </main>

    <footer class="footer">
        <div>© 2026 Curiosity</div>
        <div class="footer-links">
            <a href="#">Accessibility Settings</a>
            <a href="#">Help Center</a>
            <a href="#">Privacy Policy</a>
            <a href="#">Terms of Service</a>
        </div>
    </footer>
</body>

</html>
