<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curiosity</title>
    <script type="module" src="../js/services.js"></script>
    <script type="module" src="../js/login-register.js"></script>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="../styles/login.css">
</head>

<body>
    <header class="header">
        <div class="nav-wrapper">
            <div class="logo">Curiosity</div>
            <nav class="nav-links">
                <a href="help.html" class="help-link">Ayuda</a>
            </nav>
        </div>
        <div class="user-icon"><img src="../assets/icons/account_cicle.svg" height="30" width="30" alt="User Icon">
        </div>
    </header>

    <main class="main-content">
        <section class="image-section">
            <img src="../assets/images/pexels-august-de-richelieu-4260483 1.png"
                alt="A young student writing at a desk with a laptop and notebook" width="600" height="400">
        </section>
        <section class="form-section">
            <h1>Registrar</h1>
            <p class="subtitle">Ya tienes una cuenta? <a href="login.html">Ingresa</a></p>
            <form>
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="E-mail">
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="Contraseña">
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirmar Contraseña</label>
                    <input type="password" id="confirm-password" name="confirm-password"
                        placeholder="Confirmar Contraseña  ">
                </div>
                <button type="submit" class="submit-btn">Registrate gratuitamente!</button>
            </form>
        </section>
    </main>

    <footer class="footer">
        <div>© 2026 Curiosity</div>
        <div class="footer-links">
            <a href="#">Configuración de Accesibilidad</a>
            <a href="#">Centro de Ayuda</a>
            <a href="#">Política de Privacidad</a>
            <a href="#">Términos de Servicio</a>
        </div>
    </footer>
</body>

</html>
