<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curiosity</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="../styles/onboarding.css">
</head>

<body>
    <header class="header">
        <div class="nav-wrapper">
            <div class="logo">Curiosity</div>
            <nav class="nav-links">
                <a href="/">Courses</a>
                <a href="#">Help</a>
            </nav>
        </div>
        <div class="user-icon">Icon</div>
    </header>

    <main class="main-content">
        <div class="image-section">
            <img src="https://via.placeholder.com/150"
                alt="A laptop on a wooden desk with a video call on screen and plants in the background">
        </div>
        <div class="form-section">
            <h1>Would you like to create a course?</h1>
            <p>As a teacher, you can create courses for students to join.</p>
            <form id="course-form">
                <div class="form-group">
                    <label for="course-name">Course Name</label>
                    <input type="text" id="course-name" name="course-name"
                        placeholder="e.g., Introduction to Mathematics">
                </div>
                <div class="button-group">
                    <button type="button" class="skip-btn">Skip for now</button>
                    <button type="submit" class="submit-btn">Create Course</button>
                </div>
            </form>
        </div>
    </main>

    <footer class="footer">
        <div>© 2026 Curiosity</div>
        <div class="footer-links">
            <a href="#">Accessibility Settings</a>
            <a href="#">Help Center</a>
            <a href="#">Privacy Policy</a>
            <a href="#">Terms of Service</a>
        </div>
    </footer>

    <script type="module" src="../js/services.js"></script>
    <script type="module" src="../js/onboarding-course.js"></script>
</body>

</html>
