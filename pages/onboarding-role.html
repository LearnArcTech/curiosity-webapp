<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What is your role? - Curiosity</title>
    <script defer src="../js/layout.js"></script>
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="../styles/onboarding.css">
</head>

<body>
    <header class="header">
        <a class="brand" href="login.html" aria-label="Inicio de Curiosity">
            <img class="brand-logo" src="../Images/logo.png" alt="Logo de Curiosity">
            <span class="brand-name">Curiosity</span>
        </a>
        <nav class="nav-links">
            <a href="#">Cursos</a>
            <a href="#">Ayuda</a>
        </nav>
        <div class="account-menu">
            <button type="button" class="account-button" data-account-button aria-haspopup="true" aria-expanded="false" aria-label="Abrir menú de cuenta">
                <span class="account-icon" aria-hidden="true"></span>
            </button>
            <div class="account-dropdown" data-account-dropdown role="menu" hidden>
                <p class="account-name" data-account-name>Visitante</p>
                <button type="button" class="logout-btn" data-account-action role="menuitem">Iniciar sesión</button>
            </div>
        </div>
    </header>

    <main class="main-content">
        <section class="role-section">
            <h1>¿Cuál es tu rol?</h1>
            <p>Cambiar tu rol más tarde eliminará todos tus datos de usuario.</p>
            <form id="role-form">
                <div class="role-cards">
                    <button type="button" data-role="student" class="role-card student">
                        <span class="role-name">Estudiante</span>
                        <span class="role-description">Podrás acceder a reuniones y cursos, así como ver tu progreso.</span>
                    </button>
                    <button type="button" data-role="teacher" class="role-card teacher">
                        <span class="role-name">Profesor</span>
                        <span class="role-description">Podrás crear reuniones y cursos, anotar progreso y crear cuestionarios.</span>
                    </button>
                </div>
                <button type="button" id="continue-btn" class="submit-btn" disabled>Continuar</button>
            </form>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-brand">
            <strong>Curiosity</strong>
            <span>&copy; 2026 LearnArc</span>
        </div>
        <div class="footer-links">
            <a href="#">Ajustes de accesibilidad</a>
            <a href="#">Centro de ayuda</a>
            <a href="#">Privacidad</a>
            <a href="#">Términos</a>
        </div>
    </footer>
    <script type="module" src="../js/services.js"></script>
    <script type="module" src="../js/onboarding-role.js"></script>
</body>

</html>
