<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curiosity</title>
    <script type="module" src="../js/services.js"></script>
    <script type="module" src="../js/login-code.js"></script>
    <link rel="stylesheet" href="../styles.css">
</head>

<body>
    <header class="header">
        <div class="nav-wrapper">
            <div class="logo">Curiosity</div>
            <nav class="nav-links">
                <a href="/">Courses</a>
                <a href="#">Help</a>
            </nav>
        </div>
        <div class="user-icon">Icon</div>
    </header>

    <main class="main-content">
        <section class="image-section">
            <img src="https://via.placeholder.com/150"
                alt="A laptop on a wooden desk with a video call on screen and plants in the background">
        </section>
        <section class="form-section">
            <h1>Login with Course Code</h1>
            <form>
                <div class="form-group">
                    <label for="course-code">Course Code</label>
                    <input type="text" id="course-code" name="course-code" placeholder="Course Code">
                </div>
                <button type="submit" class="submit-btn">Login</button>
            </form>
        </section>
    </main>

    <footer class="footer">
        <div>© 2026 Curiosity</div>
        <div class="footer-links">
            <a href="#">Accessibility Settings</a>
            <a href="#">Help Center</a>
            <a href="#">Privacy Policy</a>
            <a href="#">Terms of Service</a>
        </div>
    </footer>
</body>

</html>
