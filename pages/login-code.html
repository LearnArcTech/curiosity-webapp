<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curiosity</title>
    <script type="module" src="../js/services.js"></script>
    <script type="module" src="../js/login-code.js"></script>
    <link rel="stylesheet" href="../styles.css">
</head>

<body>
    <header class="header">
        <div class="nav-wrapper">
            <div class="logo">Curiosity</div>
            <nav class="nav-links">
                <a href="help.html" class="help-link">Ayuda</a>
            </nav>
        </div>
        <div class="user-icon"><img src="../assets/icons/account_cicle.svg" height="30" width="30" alt="User Icon">
        </div>
    </header>

    <main class="main-content">
        <section class="image-section">
            <img src="../assets/images/pexels-diva-plavalaguna-6937717 1.png"
                alt="A laptop on a wooden desk with a video call on screen and plants in the background" width="600"
                height="400">
        </section>
        <section class="form-section">
            <h1>Login with Course Code</h1>
            <form>
                <div class="form-group">
                    <label for="course-code">Course Code</label>
                    <input type="text" id="course-code" name="course-code" placeholder="Course Code">
                </div>
                <button type="submit" class="submit-btn">Login</button>
            </form>
        </section>
    </main>

    <footer class="footer">
        <div>© 2026 Curiosity</div>
        <div class="footer-links">
            <a href="#">Configuración de Accesibilidad</a>
            <a href="#">Centro de Ayuda</a>
            <a href="#">Política de Privacidad</a>
            <a href="#">Términos de Servicio</a>
        </div>
    </footer>
</body>

</html>
